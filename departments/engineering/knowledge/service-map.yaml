# === Frontends ===
frontends:
  soda-admin:
    path: web/apps/soda-admin
    framework: Angular (Nx monorepo)
    description: "Internal admin portal"
  member-admin:
    path: web/apps/member-admin
    framework: Angular (Nx monorepo)
    description: "Member admin portal"
  shared:
    - web/common/       # Shared components
    - web/internals/    # Nx internals
    - web/dev-tools/    # Development tools
    - web/entrypoint/   # App entry points

# === CLI Tools ===
cli_tools:
  - cmd/soda-api        # Main API server
  - cmd/soda-job        # Batch job runner
  - cmd/soda-cli        # General CLI
  - cmd/soda-ivr        # IVR CLI
  - cmd/codeconnect-cli # CodeConnect integration
  - cmd/extend-cli      # Extend integration
  - cmd/fis-cli         # FIS integration
  - cmd/galileo-cli     # Galileo integration
  - cmd/ingo-cli        # Ingo reimbursement
  - cmd/lob-cli         # LOB (mail)
  - cmd/gsm-pubsub-sim  # Pub/Sub simulator
  - cmd/mcp             # MCP server

# === Shared Specs ===
shared_specs:
  - internal/commonapi/commonapi.yaml   # Shared parameter definitions
  - internal/commonapi/oapi-config.yaml # OpenAPI codegen config
  - internal/testapi/testapi.yaml       # Test API

# === Architecture Notes ===
architecture:
  tier_model: "Three-tier: Tier 1 (core/DB) → Tier 2 (integration) → Tier 3 (web/frontend)"
  communication: "Services only call lower-tier services. HTTP with M2M auth. Pub/Sub for async."
  id_strategy: "XID (bytea) for public IDs. Serial BIGINT/INTEGER for internal sequences."
  databases: "PostgreSQL with pgx driver. 6 databases, no cross-DB foreign keys."
  auth: "M2M (security package) + Auth0 + Azure Entra ID"
  async: "Google Cloud Pub/Sub"
  caching: "Redis (distlock, caching)"
  observability: "Datadog (tracing, metrics), structured logging (Zap)"
  storage: "Google Cloud Storage (GCS)"
  ssr: "Chi router + Templ templates"
  codegen:
    api: "oapi-codegen from OpenAPI YAML specs (make api)"
    db: "sqlc from SQL queries (make queries)"
