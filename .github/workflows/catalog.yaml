name: Build Catalog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build catalog.json
        run: python3 scripts/build-catalog.py

      - name: Verify catalog.json was generated
        run: |
          if [ ! -f catalog.json ]; then
            echo "ERROR: catalog.json was not generated"
            exit 1
          fi
          echo "catalog.json generated successfully"
          echo "Document count: $(python3 -c "import json; print(len(json.load(open('catalog.json'))['documents']))")"
